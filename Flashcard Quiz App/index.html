<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Quiz App</title>
  <link rel="stylesheet" href="quiz.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Flashcard Quiz App</h1>
      <p>Create flashcards, review answers, and test yourself in quiz mode.</p>
    </header>

    <main class="main-container">
      <!-- Action Buttons -->
      <section class="top-actions">
        <button id="add-flashcard" class="btn primary">
          <i class="fa-solid fa-plus"></i> Add Flashcard
        </button>
        <button id="start-quiz" class="btn success">
          <i class="fa-solid fa-play"></i> Start Quiz
        </button>
      </section>

      <!-- Flashcard Form -->
      <section id="add-question-card" class="form-card hidden">
        <div class="form-header">
          <h2>Add / Edit Flashcard</h2>
          <button id="close-btn" class="icon-btn" title="Close">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="form-group">
          <label for="question">Question</label>
          <textarea id="question" rows="3" placeholder="Enter your question"></textarea>
        </div>

        <div class="form-group">
          <label for="answer">Answer</label>
          <textarea id="answer" rows="3" placeholder="Enter the answer"></textarea>
        </div>

        <p id="error" class="error hidden">Please enter both question and answer.</p>

        <div class="form-actions">
          <button id="save-btn" class="btn primary">Save Flashcard</button>
        </div>
      </section>

      <!-- Flashcard List -->
      <section class="flashcards-panel">
        <div class="panel-header">
          <h2>Your Flashcards</h2>
          <button id="delete-all" class="btn danger-outline">Delete All</button>
        </div>

        <div id="empty-state" class="empty-state">
          <i class="fa-regular fa-note-sticky"></i>
          <p>No flashcards yet. Add your first flashcard to begin.</p>
        </div>

        <div class="card-list-container"></div>
      </section>

      <!-- Quiz Section -->
      <section id="quiz-section" class="quiz-section hidden">
        <div class="quiz-header">
          <div>
            <h2>Quiz Mode</h2>
            <p id="quiz-progress">Question 1 of 1</p>
          </div>
          <button id="close-quiz-btn" class="icon-btn" title="Close Quiz">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="quiz-card">
          <h3 id="quiz-question">Question appears here</h3>

          <label for="quiz-answer">Your Answer</label>
          <input
            type="text"
            id="quiz-answer"
            placeholder="Type your answer here"
          />

          <div class="quiz-actions">
            <button id="submit-quiz-answer" class="btn success">Submit Answer</button>
            <button id="restart-quiz" class="btn secondary">Restart Quiz</button>
          </div>

          <p id="quiz-feedback" class="quiz-feedback"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="quiz.js"></script>
</body>
</html>
